<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Post · Ella Goh</title>
    <meta
      name="description"
      content="A longer piece of writing by Ella Goh."
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <div class="page">
      <header class="site-header">
        <div class="site-title-block">
          <span class="site-mark">◎</span>
          <div class="site-title-text">
            <div class="site-title-main">Ella Goh</div>
            <div class="site-title-sub">Personal Web · Since 2026</div>
          </div>
        </div>
        <nav class="site-nav">
          <a href="index.html">About</a>
          <a href="projects.html">Projects</a>
          <a href="writing.html">Writing</a>
          <a href="notes.html">Notes</a>
          <a href="index.html#contact">Contact</a>
        </nav>
      </header>

      <main>
        <section class="hero" aria-labelledby="post-title">
          <div class="hero-inner">
            <p class="hero-kicker" id="post-type-label">POST</p>
            <h1 id="post-title">Loading…</h1>
            <p class="hero-subtitle" id="post-subtitle"></p>
          </div>
        </section>

        <section class="section">
          <div class="section-body">
            <p class="article-meta" id="post-meta"></p>
            <div class="article-body" id="post-content">
              <p>Loading content…</p>
            </div>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <div class="footer-left">
          <span>© 2026 Ella Goh</span>
          <span class="footer-dot">·</span>
          <span>Made with a little bit of nostalgia.</span>
        </div>
        <div class="footer-right">
          <span class="footer-badge">ELLAGOH.GITHUB.IO</span>
        </div>
      </footer>
    </div>

    <script>
      (function () {
        function getParams() {
          var params = new URLSearchParams(window.location.search);
          return {
            type: params.get("type") || "writing",
            slug: params.get("slug") || "",
          };
        }

        function loadPost() {
          var params = getParams();
          if (!params.slug) {
            document.getElementById("post-title").textContent = "Not found";
            document.getElementById("post-content").innerHTML =
              "<p>Missing <code>?slug=...</code> in the URL.</p>";
            return;
          }

          var typeLabel = params.type.toUpperCase();
          if (typeLabel === "PROJECTS") typeLabel = "PROJECT";
          if (typeLabel === "NOTES") typeLabel = "NOTE";
          document.getElementById("post-type-label").textContent = typeLabel;

          var path =
            "content/" +
            (params.type || "writing") +
            "/" +
            params.slug +
            ".md";

          fetch(path)
            .then(function (res) {
              if (!res.ok) {
                throw new Error("Failed to load markdown");
              }
              return res.text();
            })
            .then(function (raw) {
              var parts = raw.split("\n---\n");
              var header = parts[0];
              var body = parts.slice(1).join("\n---\n");

              var title = "";
              var subtitle = "";
              var meta = "";

              header.split("\n").forEach(function (line) {
                var idx = line.indexOf(":");
                if (idx === -1) return;
                var key = line
                  .slice(0, idx)
                  .trim()
                  .toLowerCase();
                var value = line.slice(idx + 1).trim();
                if (key === "title") title = value;
                if (key === "subtitle") subtitle = value;
                if (key === "meta") meta = value;
              });

              if (!title) {
                title = params.slug.replace(/-/g, " ");
              }

              document.getElementById("post-title").textContent = title;
              document.getElementById("post-subtitle").textContent = subtitle;
              document.getElementById("post-meta").textContent = meta;

              var html = marked.parse(body || "");
              document.getElementById("post-content").innerHTML = html;
            })
            .catch(function () {
              document.getElementById("post-title").textContent = "Not found";
              document.getElementById("post-content").innerHTML =
                "<p>Could not load this post. Check that the markdown file exists.</p>";
            });
        }

        loadPost();
      })();
    </script>
  </body>
</html>
