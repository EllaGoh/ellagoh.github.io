# 只部署已构建的 public/，不在 CI 里构建（本地 hugo 后提交 public 再 push）
name: Deploy static site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check public
        run: |
          if [[ ! -f public/index.html ]]; then
            echo "::error::public/index.html 不存在。请本地先执行: hugo --minify --baseURL https://ellagoh.github.io/"
            echo "然后: git add public && git commit -m 'Update site' && git push"
            exit 1
          fi

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
